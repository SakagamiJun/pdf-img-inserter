version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 15
      semver-major-days: 30
    groups:
      non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Tokyo
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 15
      semver-major-days: 30
    groups:
      non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: deps

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Tokyo
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 15
      semver-major-days: 30
    groups:
      non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: deps
